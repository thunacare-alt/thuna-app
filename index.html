<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Base href is replaced by the --base-href passed to `flutter build web`. -->
  <base href="/thuna-app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#23303A">

  <!-- SEO / social preview -->
  <meta name="description"
        content="thuna.care — preventive home healthcare that stays with your family. Track your health, see what needs attention, and stay connected to your care team.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="thuna.care">
  <meta property="og:description"
        content="Preventive home healthcare that stays with your family.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="thuna.care">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>thuna.care</title>

  <!-- Playfair Display for the wordmark on the loading splash (matches the
       in-app brand). Fails gracefully to a serif fallback if offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap">

  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #23303A; }
    * { box-sizing: border-box; }

    /* Branded loading splash — shown until Flutter paints its first frame, so
       the heavy first load never shows a white blank. Matches the in-app
       SplashLoader (navy gradient + thuna.care wordmark) for a seamless handoff. */
    #thuna-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(120% 80% at 50% 18%, rgba(58,77,92,0.45) 0%, rgba(58,77,92,0) 60%),
        linear-gradient(180deg, #23303A 0%, #2E3F4C 100%);
      color: #F5F0E8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: opacity 500ms ease;
    }
    #thuna-splash.hide { opacity: 0; pointer-events: none; }

    .thuna-wordmark {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-weight: 600;
      font-size: 46px;
      letter-spacing: -0.5px;
      line-height: 1;
      color: #F5F0E8;
      user-select: none;
    }
    .thuna-wordmark .suffix { color: #6E8BA0; }

    .thuna-spinner {
      margin-top: 34px;
      width: 30px;
      height: 30px;
      border: 2.5px solid rgba(245,240,232,0.18);
      border-top-color: #8AA4B6;
      border-radius: 50%;
      animation: thuna-spin 0.9s linear infinite;
    }
    @keyframes thuna-spin { to { transform: rotate(360deg); } }

    .thuna-tagline {
      margin-top: 22px;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.2px;
      color: rgba(245,240,232,0.72);
    }
    .thuna-footer {
      position: absolute;
      bottom: 30px;
      font-size: 11px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgba(245,240,232,0.5);
    }
  </style>
</head>
<body>
  <div id="thuna-splash">
    <div class="thuna-wordmark">thuna<span class="suffix">.care</span></div>
    <div class="thuna-spinner"></div>
    <div class="thuna-tagline">Care that stays with you</div>
    <div class="thuna-footer">Preventive Home Healthcare</div>
  </div>

  <noscript>
    <div style="color:#F5F0E8;font-family:sans-serif;text-align:center;padding:40px">
      thuna.care needs JavaScript enabled to run.
    </div>
  </noscript>

    function hideThunaSplash() {
      var s = document.getElementById('thuna-splash');
      if (!s) return;
      s.classList.add('hide');
      setTimeout(function () { if (s && s.parentNode) s.parentNode.removeChild(s); }, 550);
    }

    _flutter.loader.load({
      onEntrypointLoaded: async function (engineInitializer) {
        var appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
        // Let the first frame paint into the navy in-app splash, then reveal it.
        requestAnimationFrame(function () {
          requestAnimationFrame(hideThunaSplash);
        });
      }
    });

    // Safety net: never leave the splash stuck if something stalls.
    setTimeout(hideThunaSplash, 12000);
  </script>
</body>
</html>
